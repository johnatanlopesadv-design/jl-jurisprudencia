  <!-- Base horizontal -->
  <line x1="168" y1="406" x2="344" y2="406" stroke="#c9a84c" stroke-width="12" stroke-linecap="round"/>
  <!-- Pezinho central -->
  <line x1="256" y1="390" x2="256" y2="418" stroke="#c9a84c" stroke-width="12" stroke-linecap="round"/>

  <!-- Viga horizontal -->
  <line x1="90" y1="148" x2="422" y2="148" stroke="#c9a84c" stroke-width="12" stroke-linecap="round"/>
  <!-- Pivô -->
  <circle cx="256" cy="148" r="18" fill="#c9a84c"/>
  <circle cx="256" cy="148" r="9" fill="#1a1a2e"/>

  <!-- Fios prato esquerdo -->
  <line x1="122" y1="148" x2="102" y2="258" stroke="#c9a84c" stroke-width="6" stroke-linecap="round"/>
  <line x1="122" y1="148" x2="158" y2="258" stroke="#c9a84c" stroke-width="6" stroke-linecap="round"/>
  <!-- Prato esquerdo -->
  <path d="M92 258 Q130 278 168 258" stroke="#c9a84c" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Fios prato direito -->
